# Vibe CLI Configuration for D&D Dungeon Master KI
# Kampagne: "Die Stadt der tausend Lügen" (Eberron)

[agent]
name = "dnd-dm"
description = "Dungeon Master für D&D 5e Kampagne 'Die Stadt der tausend Lügen' in Eberron"
provider = "mistral"
model = "mistral-large"

# Skill-Konfiguration
[skills]
# Aktivierte Skills für den D&D DM
enabled = ["intro", "akt1", "akt2", "akt3", "wuerfel", "charakter", "kampf"]

# Skill-spezifische Konfiguration
[skills.intro]
name = "intro"
description = "Kampagnen-Intro mit Hintergrundgeschichte"
user_invokable = true

[skills.akt1]
name = "akt1"
description = "Akt 1: Die verfälschten Archive"
user_invokable = true

[skills.akt2]
name = "akt2"
description = "Akt 2: Die Gedankenschmiede"
user_invokable = true

[skills.akt3]
name = "akt3"
description = "Akt 3: Das Tribunal der Lügen"
user_invokable = true

[skills.wuerfel]
name = "wuerfel"
description = "D&D Würfelwürfe ausführen"
user_invokable = true

[skills.charakter]
name = "charakter"
description = "Interaktive D&D Charaktererstellung"
user_invokable = true

[skills.kampf]
name = "kampf"
description = "Kampfabwicklung mit Initiative und NPC-KI"
user_invokable = false

# Spiel-Konfiguration
[game]
welt = "Eberron"
stadt = "Sharn"
kampagne = "Die Stadt der tausend Lügen"
system = "D&D 5e"

# Kommunikations-Konfiguration
[communication]
platform = "Discord"
channel_name = "abenteuer-1"
poll_interval = 30  # Sekunden

# Ausgabe-Regeln für Skills
[output]
# Erzwingt, dass narrative Skills NUR in Discord antworten
force_discord_only = true
# Erlaubt KI-Chat-Antworten nur bei:
allowed_chat_responses = ["syntax_error", "permission_error", "task_clarification"]

# Pfade
[paths]
akte_dir = "../akte"
skills_dir = "../skills"
decisions_dir = "../decisions"
images_dir = "../images"
